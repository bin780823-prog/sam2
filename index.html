<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼국지 II - 웹 플레이어</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#c8b080; font-family:'Malgun Gothic',sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
header { width:100%; max-width:1040px; padding:18px 24px 10px; display:flex; align-items:center; gap:16px; border-bottom:1px solid #2a2010; }
header h1 { font-size:20px; font-weight:700; letter-spacing:4px; color:#e8c87a; }
header span { font-size:12px; color:#2a2010; letter-spacing:2px; }
.screen-wrap { position:relative; margin:24px auto 0; width:1024px; max-width:calc(100vw - 32px); border:1px solid #2a2010; background:#000; aspect-ratio:4/3; overflow:hidden; }
#jsdos { display:block; width:100%!important; height:100%!important; image-rendering:pixelated; }
#loading-overlay { position:absolute; inset:0; background:#0a0a0a; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; z-index:10; }
.loading-title { font-size:28px; font-weight:700; letter-spacing:8px; color:#e8c87a; }
.loading-sub { font-size:12px; letter-spacing:3px; color:#2a2010; }
.progress-bar { width:320px; height:3px; background:#2a2010; border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:#e8c87a; border-radius:2px; width:0%; transition:width 0.3s; }
#status-text { font-size:11px; color:#2a2010; letter-spacing:1px; min-height:16px; }
.controls { width:1024px; max-width:calc(100vw - 32px); margin:12px auto 0; display:flex; gap:8px; align-items:center; }
.btn { padding:7px 16px; background:transparent; border:1px solid #2a2010; color:#e8c87a; font-size:12px; cursor:pointer; border-radius:2px; transition:all 0.15s; font-family:inherit; letter-spacing:1px; }
.btn:hover { border-color:#e8c87a; }
.hint { margin-left:auto; font-size:11px; color:#2a2010; }
#save-badge { font-size:10px; color:#e8c87a; opacity:0; transition:opacity 0.5s; padding:4px 10px; border:1px solid #2a2010; border-radius:2px; }
footer { margin:24px auto; font-size:10px; color:#2a2010; letter-spacing:2px; }
#error-box { display:none; position:absolute; inset:0; background:#0a0a0a; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:20; text-align:center; padding:32px; }
#error-box h2 { color:#a04030; font-size:16px; }
#error-box p { color:#6a4a3a; font-size:12px; line-height:1.8; white-space:pre-line; }
</style>
</head>
<body>
<header><h1>三 國 志 II</h1><span>ROMANCE OF THE THREE KINGDOMS II · KOEI 1989</span></header>
<div class="screen-wrap" id="screen-wrap">
  <canvas id="jsdos"></canvas>
  <div id="loading-overlay">
    <div class="loading-title">三 國 志 II</div>
    <div class="loading-sub">ROMANCE OF THE THREE KINGDOMS II</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div id="status-text">초기화 중...</div>
  </div>
  <div id="error-box"><h2>⚠ 실행 오류</h2><p id="error-detail"></p></div>
</div>
<div class="controls">
  <button class="btn" onclick="toggleFullscreen()">전체화면</button>
  <button class="btn" onclick="restartGame()">재시작</button>
  <span id="save-badge">💾 저장됨</span>
  <span class="hint">화면 클릭 후 키보드 사용</span>
</div>
<footer>KOEI 1989 · js-dos 6.22 · 세이브 데이터 IndexedDB 자동 보존</footer>
<script src="./js-dos.js"></script>
<script>
var o=document.getElementById('loading-overlay'),eb=document.getElementById('error-box'),
    ed=document.getElementById('error-detail'),fp=document.getElementById('progress-fill'),
    st=document.getElementById('status-text'),sb=document.getElementById('save-badge');
function sp(p,m){fp.style.width=p+'%';st.textContent=m;}
function se(m){o.style.display='none';eb.style.display='flex';ed.textContent=m;}
function showSave(){sb.style.opacity='1';setTimeout(function(){sb.style.opacity='0';},2000);}

window.addEventListener('load',function(){
  if(typeof Dos==='undefined'){se('js-dos.js 로드 실패.');return;}
  sp(10,'DOSBox 초기화 중...');
  var base=window.location.href.replace(/\/[^\/]*$/,'/');

  Dos(document.getElementById('jsdos'),{
    wdosboxUrl: base+'wdosbox.js',
  }).ready(function(fs,main){
    sp(40,'세이브 데이터 복원 중...');
    // /game 마운트 → IDBFS 자동 활성화 → IndexedDB 세이브 보존
    fs.extract(base+'game.zip', '/game').then(function(){
      sp(90,'게임 실행 중...');
      // cd game 후 실행 (파일이 /game 에 있으므로)
      return main(['-c', 'cd game', '-c', 'RTK2.COM']);
    }).then(function(){
      o.style.display='none';
      setInterval(showSave, 30000);
    }).catch(function(e){se('오류: '+(e.message||String(e)));}); 
  }).catch(function(e){se('DOSBox 오류: '+(e.message||String(e)));}); 
});

function toggleFullscreen(){
  var w=document.getElementById('screen-wrap');
  if(!document.fullscreenElement)(w.requestFullscreen||w.webkitRequestFullscreen).call(w);
  else(document.exitFullscreen||document.webkitExitFullscreen).call(document);
}
function restartGame(){if(confirm('재시작하시겠습니까?'))location.reload();}
</script>
</body>
</html>
